services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/workspace/target
    working_dir: /workspace
    tty: true
    stdin_open: true
    command: sleep infinity

volumes:
  cargo-registry:
  cargo-git:
  target-cache:
